<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Godview Safari — Living Diorama</title>
    <meta
      name="description"
      content="A realtime Three.js tabletop safari diorama with animated herds, warm study-room lighting, and interactive map controls."
    />
    <script>
      // ---- Dev live-reload (no extra server needed) ----
      // The app is now split into modules, so the poller HEAD-checks every
      // source file once a second (Last-Modified + Content-Length) and
      // reloads when ANY of them changes. Works against a plain
      // `python3 -m http.server`. Active only on localhost, or anywhere
      // with ?live; disable with ?live=0.
      (function () {
        const p = new URLSearchParams(location.search);
        const forced = p.get("live");
        if (forced === "0" || forced === "off") return;
        const isLocal = ["localhost", "127.0.0.1", "[::1]"].includes(
          location.hostname,
        );
        if (!location.protocol.startsWith("http")) return;
        if (!isLocal && forced === null) return;

        const dir = location.pathname.replace(/[^/]*$/, "");
        const FILES = [
          location.pathname.endsWith("/")
            ? location.pathname + "index.html"
            : location.pathname,
          dir + "styles/tokens.css",
          dir + "styles/app.css",
          dir + "src/core/utils.js",
          dir + "src/core/config.js",
          dir + "src/core/context.js",
          dir + "src/core/materials.js",
          dir + "src/world/terrain.js",
          dir + "src/world/vegetation.js",
          dir + "src/world/environment.js",
          dir + "src/animals/animals.js",
          dir + "src/room/room.js",
          dir + "src/camera/mapcam.js",
          dir + "src/sim/daynight.js",
          dir + "src/ui/dashboard.js",
          dir + "src/main.js",
        ];
        let signature = null;

        async function poll() {
          try {
            const parts = await Promise.all(
              FILES.map(async (url) => {
                const res = await fetch(url + "?_lr=" + Date.now(), {
                  method: "HEAD",
                  cache: "no-store",
                });
                return (
                  (res.headers.get("Last-Modified") || "") +
                  "|" +
                  (res.headers.get("Content-Length") || "")
                );
              }),
            );
            const next = parts.join("§");
            if (signature !== null && next !== signature) {
              console.info("[live-reload] change detected — reloading");
              location.reload();
              return;
            }
            signature = next;
          } catch (e) {
            // Server briefly unreachable (e.g. mid-save) — just retry.
          }
          window.__lrTimer = setTimeout(poll, 1000);
        }
        poll();
        console.info("[live-reload] watching " + FILES.length + " files (add ?live=0 to disable)");
      })();
    </script>
    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="styles/app.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main id="scene" aria-label="Godview Safari living diorama"></main>
    <div class="loading">Loading Godview Safari</div>
    <div class="hud" id="hud">
      <b>拖动 / 双指滑动</b> 平移(带惯性) · <b>捏合 / Ctrl+滚轮</b> 缩放 ·
      <b>双击</b> 放大 · <b>Option+双击</b> 缩小 ·
      <b>双指捻转</b> 旋转(触屏/Safari 触控板;Chrome 用 <b>Option+双指滑</b>) ·
      <b>Option+拖 / 拖罗盘</b> 旋转·俯仰 · <b>方向键/WASD</b> 平移 ·
      <b>⇧⌘↑</b> 回正北 · <b>右侧滑杆</b> 俯仰 · <b>F</b> 自由飞行 ·
      <b>太阳钟</b> 拖=调时 点=加速 · <b>T</b> 暂停 · <b>v34</b>
    </div>
    <div id="flyBadge">自由飞行 · <b>拖动</b>看向 · <b>WASD</b>走 · <b>Q/E·空格</b>升降 · <b>滚轮</b>前后 · <b>F</b> 退出</div>

    <!-- Right-side control dashboard: time, sun dial, tilt, zoom, compass -->
    <div id="dashboard">
      <div id="dayClock" title="地图时间 · T 暂停/继续 · [ ] 调时间">06:00 · Day</div>
      <div id="sunOrb" title="太阳钟:拖动调时间 · 点表盘循环加速 ×1/×4/×8(只作用于桌面地图,房间不受影响)">
        <svg id="orbSvg" viewBox="0 0 100 100">
          <defs>
            <clipPath id="orbClip"><circle cx="50" cy="50" r="47" /></clipPath>
          </defs>
          <!-- sky disc: tinted live from the day-night palette -->
          <circle id="orbSky" cx="50" cy="50" r="47" fill="#8aa6c8" />
          <g clip-path="url(#orbClip)">
            <!-- below-horizon (night) half -->
            <rect id="orbBelow" x="1" y="50" width="98" height="49" fill="rgba(8,8,14,0.34)" />
          </g>
          <!-- hour ticks: 24h dial, one every 2h (major at 6h) -->
          <g id="orbTicks" stroke="rgba(255,250,240,0.5)">
            <line x1="50" y1="3.5" x2="50" y2="9" stroke-width="1.6" />
            <line x1="50" y1="91" x2="50" y2="96.5" stroke-width="1.6" />
            <line x1="3.5" y1="50" x2="9" y2="50" stroke-width="1.6" />
            <line x1="91" y1="50" x2="96.5" y2="50" stroke-width="1.6" />
            <line x1="17.2" y1="17.2" x2="21.1" y2="21.1" stroke-width="1" />
            <line x1="78.9" y1="21.1" x2="82.8" y2="17.2" stroke-width="1" />
            <line x1="17.2" y1="82.8" x2="21.1" y2="78.9" stroke-width="1" />
            <line x1="78.9" y1="78.9" x2="82.8" y2="82.8" stroke-width="1" />
          </g>
          <line id="orbHorizon" x1="3" y1="50" x2="97" y2="50" stroke="rgba(255,250,240,0.55)" stroke-width="1" stroke-dasharray="3 3" />
          <!-- the big ball: the ground/earth the sun orbits -->
          <circle id="orbEarth" cx="50" cy="50" r="15" fill="#b59265" stroke="rgba(0,0,0,0.35)" stroke-width="1" />
          <!-- pale moon, always opposite the sun -->
          <circle id="orbMoon" cx="88" cy="50" r="3.6" fill="#cdd4e2" opacity="0.85" />
          <!-- the small ball: the sun, with its glow -->
          <circle id="orbSunGlow" cx="12" cy="50" r="11" fill="#ffd9a0" opacity="0.3" />
          <circle id="orbSun" cx="12" cy="50" r="6" fill="#ffe9c4" stroke="rgba(0,0,0,0.25)" stroke-width="0.8" />
          <circle cx="50" cy="50" r="47" fill="none" stroke="rgba(255,254,248,0.85)" stroke-width="2.5" />
        </svg>
        <div id="orbSpeedRow" title="时间加速(只加速桌面地图上的一切)">
          <button id="spd1" class="active">×1</button>
          <button id="spd4">×4</button>
          <button id="spd8">×8</button>
        </div>
      </div>
      <div id="tiltCtl" title="俯仰:上 = 俯视,下 = 平视">
        <div class="track"></div>
        <div id="tiltKnob"></div>
      </div>
      <div id="zoomCtl">
        <button id="zoomIn" title="放大">+</button>
        <button id="zoomOut" title="缩小">−</button>
      </div>
      <button id="resetView" title="回到默认视角" aria-label="回到默认视角">↺</button>
      <div id="compass" title="点击回正北 · 按住拖动旋转">
        <div id="compassNeedle"><span class="n">▲</span><span class="s">▼</span></div>
        <span class="nLabel">N</span>
      </div>
    </div>

    <div class="vignette"></div>
    <div class="grain"></div>

    <script type="module" src="src/main.js?v=34"></script>
  </body>
</html>
